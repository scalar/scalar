name: 'Setup Node'
description: |
  Set up pnpm, Node.js, and the caches used by every JS job in this repo.

  Caches are deliberately branch-scoped so that a PR can never overwrite the
  cache that a main-branch run will read. See AGENTS.md and the CI strategy
  doc for the cache-poisoning threat model that justifies this.
inputs:
  node-version:
    description: 'Node.js version to use (optional, defaults to reading from .nvmrc)'
    required: false
  cache-version:
    description: |
      Manual cache-buster. Bump this if a cache layout changes and we need to
      invalidate every cache key across all branches at once.
    required: false
    default: 'v1'
runs:
  using: 'composite'
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
    - name: Read Node.js version from .nvmrc
      id: node-version
      shell: bash
      run: |
        if [ -n "${{ inputs.node-version }}" ]; then
          echo "version=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
        else
          echo "version=$(cat .nvmrc | tr -d 'v')" >> "$GITHUB_OUTPUT"
        fi
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ steps.node-version.outputs.version }}
        cache: 'pnpm'

    # Branch-scoped persistent turbo cache. Lives on Blacksmith stickydisk so
    # it survives across runs of the same branch + node version. Crucially the
    # key includes github.ref_name: a PR cannot read or write main's cache.
    - if: startsWith(runner.name, 'blacksmith')
      name: Setup persistent turbo cache
      uses: useblacksmith/stickydisk@41873b1513bb679f9c115504cbd13d3660432504 # v1
      with:
        key: ${{ github.repository }}-${{ github.ref_name }}-turbo-cache-${{ steps.node-version.outputs.version }}-${{ inputs.cache-version }}
        path: ./.turbo

    # Branch-scoped pnpm store cache. The pnpm-lock.yaml hash in the key means
    # any lockfile change invalidates the cache for that branch, and integrity
    # hashes inside pnpm still verify each tarball at install time.
    - if: startsWith(runner.name, 'blacksmith')
      name: Setup persistent pnpm store cache
      uses: useblacksmith/stickydisk@41873b1513bb679f9c115504cbd13d3660432504 # v1
      with:
        key: ${{ github.repository }}-${{ github.ref_name }}-pnpm-store-${{ steps.node-version.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ inputs.cache-version }}
        path: ~/.local/share/pnpm/store
