name: 'Check Changes'
description: |
  Detect which areas of the monorepo are affected by the current event and
  emit one boolean output per scope. Used by both `pr.yml` (to skip
  irrelevant test and preview-deploy jobs) and `main.yml` (to gate
  integration publishes on actual changes).

  Detection runs in two layers for the JS scopes:

    1. Path-based (step-security/changed-files): fast, no install needed,
       captures direct file modifications. Used as the primary signal for
       non-pnpm integrations (rust, django-ninja, docker source) and for
       every `*_package_changed` output that drives a production publish.
    2. Graph-based (pnpm filter `...[base]`): walks the workspace
       `package.json` graph and returns every package that has either
       directly changed since the base commit OR has a transitive
       workspace dependency that has. This is the only layer that can
       answer "preview my api-reference because helpers changed" on a PR
       that has no changeset yet.

  Why not changesets?

    For production publishes we do not need graph awareness here at all:
    `changesets/action` has already version-bumped each integration's
    `package.json` by the time publish-integrations runs, so path-detecting
    those bumps (the `*_package_changed` outputs) is exact and sufficient.

    For PR previews changesets are unreliable: a contributor often opens
    the PR before writing a changeset, and refactors in low-level packages
    routinely ship under another package's changeset. The pnpm graph is
    derived from the actual workspace dependency edges and is correct from
    the first commit of a PR.

  The final output for each JS scope is the OR of path-based + graph-based.
  Path-based remains the safety net if the graph step cannot resolve a base
  ref (first push to a new branch, force push, missing history).

outputs:
  # Integration source trees (drive *-build-test jobs on PRs)
  dotnet_changed:
    description: 'integrations/dotnet/**'
    value: ${{ steps.changed-integration-files.outputs.dotnet_integration_any_changed }}
  java_changed:
    description: 'integrations/java/**'
    value: ${{ steps.changed-integration-files.outputs.java_integration_any_changed }}
  fastapi_changed:
    description: 'integrations/fastapi/**'
    value: ${{ steps.changed-integration-files.outputs.fastapi_integration_any_changed }}
  django_ninja_changed:
    description: 'integrations/django-ninja/**'
    value: ${{ steps.changed-integration-files.outputs.django_ninja_integration_any_changed }}
  rust_changed:
    description: 'integrations/rust/**'
    value: ${{ steps.changed-integration-files.outputs.rust_integration_any_changed }}
  docker_changed:
    description: 'integrations/docker/**'
    value: ${{ steps.changed-integration-files.outputs.docker_integration_any_changed }}

  # Integration package.json bumps (drive *-publish jobs on main).
  # These are the post-`changesets/action` signal: when changesets has
  # version-bumped a package.json, the corresponding *_package_changed
  # output flips true and the matching publish job runs.
  aspnetcore_package_changed:
    description: 'integrations/dotnet/aspnetcore/package.json'
    value: ${{ steps.changed-package-files.outputs.aspnetcore_package_any_changed }}
  aspire_package_changed:
    description: 'integrations/dotnet/aspire/package.json'
    value: ${{ steps.changed-package-files.outputs.aspire_package_any_changed }}
  fastapi_package_changed:
    description: 'integrations/fastapi/package.json'
    value: ${{ steps.changed-package-files.outputs.fastapi_package_any_changed }}
  django_ninja_package_changed:
    description: 'integrations/django-ninja/package.json'
    value: ${{ steps.changed-package-files.outputs.django_ninja_package_any_changed }}
  rust_package_changed:
    description: 'integrations/rust/package.json'
    value: ${{ steps.changed-package-files.outputs.rust_package_any_changed }}
  java_package_changed:
    description: 'integrations/java/package.json'
    value: ${{ steps.changed-package-files.outputs.java_package_any_changed }}
  docker_package_changed:
    description: 'integrations/docker/package.json'
    value: ${{ steps.changed-package-files.outputs.docker_package_any_changed }}
  mock_server_docker_package_changed:
    description: 'packages/mock-server/docker/package.json'
    value: ${{ steps.changed-package-files.outputs.mock_server_docker_package_any_changed }}

  # JS package scopes — union of path-based and pnpm-graph-based detection.
  # These drive PR-side test and preview-deploy gates, where graph awareness
  # matters (changes to a leaf package transitively affect every consumer).
  icons_changed:
    description: 'packages/icons/**, ScalarIcon component, or any pnpm dependent of @scalar/icons'
    value: ${{ steps.combine.outputs.icons }}
  galaxy_changed:
    description: 'packages/galaxy/** or any pnpm dependent of @scalar/galaxy'
    value: ${{ steps.combine.outputs.galaxy }}
  api_client_changed:
    description: 'packages/api-client/**, projects/scalar-app/**, or any pnpm dependent of @scalar/api-client'
    value: ${{ steps.combine.outputs.api_client }}
  api_reference_changed:
    description: 'packages/api-reference/** or any pnpm dependent of @scalar/api-reference'
    value: ${{ steps.combine.outputs.api_reference }}
  components_changed:
    description: 'packages/components/** or any pnpm dependent of @scalar/components'
    value: ${{ steps.combine.outputs.components }}
  scalar_app_package_changed:
    description: 'projects/scalar-app/package.json (drives todesktop on main)'
    value: ${{ steps.changed-packages-files.outputs.scalar_app_package_any_changed }}

  # Broad JS-side gates
  js_changed:
    description: 'Any JS/TS file or workspace config touched'
    value: ${{ steps.changed-js.outputs.js_any_changed }}
  lockfile_changed:
    description: 'pnpm-lock.yaml or workspace package.json files touched'
    value: ${{ steps.changed-js.outputs.lockfile_any_changed }}

runs:
  using: 'composite'
  steps:
    # -------------------------------------------------------------------------
    # Layer 1: path-based detection (cheap, no install needed)
    # -------------------------------------------------------------------------
    - name: Check whether integration files were modified
      id: changed-integration-files
      uses: step-security/changed-files@60967b822d3001fa82242f8d6b4ed46bc3600a68 # v47
      with:
        files_yaml: |
          dotnet_integration:
            - integrations/dotnet/**
          java_integration:
            - integrations/java/**
          fastapi_integration:
            - integrations/fastapi/**
          rust_integration:
            - integrations/rust/**
          docker_integration:
            - integrations/docker/**
          django_ninja_integration:
            - integrations/django-ninja/**

    - name: Check whether packages files were modified
      id: changed-packages-files
      uses: step-security/changed-files@60967b822d3001fa82242f8d6b4ed46bc3600a68 # v47
      with:
        files_yaml: |
          icons_changed:
            - packages/icons/**
            - packages/components/src/components/ScalarIcon/**
          galaxy_changed:
            - packages/galaxy/**
          api_client_changed:
            - packages/api-client/**
            - projects/scalar-app/**
          api_reference_changed:
            - packages/api-reference/**
          components_changed:
            - packages/components/**
          scalar_app_package:
            - projects/scalar-app/package.json

    - name: Check whether integration package.json files were modified
      id: changed-package-files
      uses: step-security/changed-files@60967b822d3001fa82242f8d6b4ed46bc3600a68 # v47
      with:
        files_yaml: |
          aspnetcore_package:
            - integrations/dotnet/aspnetcore/package.json
          aspire_package:
            - integrations/dotnet/aspire/package.json
          fastapi_package:
            - integrations/fastapi/package.json
          django_ninja_package:
            - integrations/django-ninja/package.json
          rust_package:
            - integrations/rust/package.json
          java_package:
            - integrations/java/package.json
          docker_package:
            - integrations/docker/package.json
          mock_server_docker_package:
            - packages/mock-server/docker/package.json

    - name: Check broad JS scopes
      id: changed-js
      uses: step-security/changed-files@60967b822d3001fa82242f8d6b4ed46bc3600a68 # v47
      with:
        files_yaml: |
          js:
            - '**/*.{ts,tsx,js,jsx,cjs,mjs,vue,css}'
            - '**/package.json'
            - '**/tsconfig*.json'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'
            - 'turbo.json'
          lockfile:
            - 'pnpm-lock.yaml'
            - '**/package.json'
            - 'pnpm-workspace.yaml'

    # -------------------------------------------------------------------------
    # Layer 2: graph-based detection via pnpm filter `...[base]`
    #
    # `pnpm m ls --filter "...[<base>]" --json` returns every workspace
    # package whose tracked files changed since `<base>` PLUS every package
    # that transitively depends on one of those (the leading `...` is pnpm's
    # "include dependents" prefix). This reads `pnpm-workspace.yaml` and the
    # individual `package.json` files at the current commit; it does not
    # need `node_modules` installed.
    # -------------------------------------------------------------------------
    - name: Install pnpm (for graph analysis)
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

    - name: Read Node.js version from .nvmrc
      id: node-version
      shell: bash
      run: echo "version=$(tr -d 'v' < .nvmrc)" >> "$GITHUB_OUTPUT"

    - name: Setup Node.js (for pnpm runtime)
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ steps.node-version.outputs.version }}

    - name: Compute affected workspace packages
      id: affected
      shell: bash
      env:
        # actions/checkout populates these contexts on PR and push events
        # respectively. Fall back to empty when neither is set
        # (workflow_dispatch, schedule).
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
      run: |
        set -euo pipefail

        # Pick a base ref to diff against.
        if [ -n "${PR_BASE_SHA:-}" ]; then
          BASE="$PR_BASE_SHA"
        elif [ -n "${PUSH_BEFORE_SHA:-}" ] && [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
          BASE="$PUSH_BEFORE_SHA"
        else
          # No usable base (first push to a new branch, workflow_dispatch on
          # a fresh ref, etc). Conservative fail-safe: mark every JS scope
          # as affected so a required test or preview is never silently
          # skipped because we could not determine the diff.
          echo "No usable base ref; conservatively marking every JS scope as affected"
          {
            echo "api_reference=true"
            echo "api_client=true"
            echo "components=true"
            echo "icons=true"
            echo "galaxy=true"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # actions/checkout defaults to a shallow clone. Fetch the base if it
        # is not already reachable so `git diff` can resolve it.
        if ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
          echo "Fetching base ref ${BASE}"
          git fetch --no-tags --depth=1 origin "$BASE" 2>/dev/null \
            || git fetch --no-tags --unshallow 2>/dev/null \
            || echo "::warning::Could not fetch base ref ${BASE}; graph detection may be incomplete"
        fi

        # `...[ref]` selects packages with changes since ref PLUS every
        # package that transitively depends on them. `pnpm m ls --json`
        # outputs the matching packages as a JSON array; on failure (e.g.
        # base still unreachable) we collapse to an empty list and the
        # path-based layer alone determines the result.
        AFFECTED_JSON=$(pnpm m ls --filter "...[${BASE}]" --json --depth=-1 2>/dev/null || echo '[]')
        AFFECTED=$(echo "$AFFECTED_JSON" | jq -r '.[].name // empty' | sort -u)

        echo "Affected workspace packages (changed + dependents):"
        if [ -z "$AFFECTED" ]; then
          echo "  (none)"
        else
          echo "$AFFECTED" | sed 's/^/  /'
        fi

        # Always emit an explicit boolean for every scope so the combine
        # step's contract is "missing output => bug", not "missing => false".
        emit_flag() {
          local pkg="$1"
          local out="$2"
          if echo "$AFFECTED" | grep -qFx "$pkg"; then
            echo "${out}=true" >> "$GITHUB_OUTPUT"
          else
            echo "${out}=false" >> "$GITHUB_OUTPUT"
          fi
        }

        emit_flag '@scalar/api-reference' api_reference
        emit_flag '@scalar/api-client' api_client
        emit_flag '@scalar/components' components
        emit_flag '@scalar/icons' icons
        emit_flag '@scalar/galaxy' galaxy

    # -------------------------------------------------------------------------
    # Combine: emit final scope outputs as OR(path-based, graph-based).
    # -------------------------------------------------------------------------
    - name: Combine path-based and graph-based flags
      id: combine
      shell: bash
      env:
        PATH_ICONS: ${{ steps.changed-packages-files.outputs.icons_changed_any_changed }}
        PATH_GALAXY: ${{ steps.changed-packages-files.outputs.galaxy_changed_any_changed }}
        PATH_API_CLIENT: ${{ steps.changed-packages-files.outputs.api_client_changed_any_changed }}
        PATH_API_REFERENCE: ${{ steps.changed-packages-files.outputs.api_reference_changed_any_changed }}
        PATH_COMPONENTS: ${{ steps.changed-packages-files.outputs.components_changed_any_changed }}
        GRAPH_ICONS: ${{ steps.affected.outputs.icons }}
        GRAPH_GALAXY: ${{ steps.affected.outputs.galaxy }}
        GRAPH_API_CLIENT: ${{ steps.affected.outputs.api_client }}
        GRAPH_API_REFERENCE: ${{ steps.affected.outputs.api_reference }}
        GRAPH_COMPONENTS: ${{ steps.affected.outputs.components }}
      run: |
        set -euo pipefail
        or_flag() {
          if [ "$1" = "true" ] || [ "$2" = "true" ]; then
            echo true
          else
            echo false
          fi
        }
        {
          echo "icons=$(or_flag "$PATH_ICONS" "$GRAPH_ICONS")"
          echo "galaxy=$(or_flag "$PATH_GALAXY" "$GRAPH_GALAXY")"
          echo "api_client=$(or_flag "$PATH_API_CLIENT" "$GRAPH_API_CLIENT")"
          echo "api_reference=$(or_flag "$PATH_API_REFERENCE" "$GRAPH_API_REFERENCE")"
          echo "components=$(or_flag "$PATH_COMPONENTS" "$GRAPH_COMPONENTS")"
        } >> "$GITHUB_OUTPUT"
