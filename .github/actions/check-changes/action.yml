name: 'Check Changes'
description: |
  Detect which areas of the monorepo were touched by the current event. Emits
  one boolean output per scope. Used by both `pr.yml` (to skip irrelevant
  jobs) and `main.yml` (to gate integration publishes on actual changes).

  This is a composite rather than a standalone reusable workflow because we
  want the outputs surfaced as a single job's outputs in the calling
  workflow, and composite actions compose more cleanly with `needs.<job>`.
outputs:
  # Integration source trees (drive *-build-test jobs)
  dotnet_changed:
    description: 'integrations/dotnet/**'
    value: ${{ steps.changed-integration-files.outputs.dotnet_integration_any_changed }}
  java_changed:
    description: 'integrations/java/**'
    value: ${{ steps.changed-integration-files.outputs.java_integration_any_changed }}
  fastapi_changed:
    description: 'integrations/fastapi/**'
    value: ${{ steps.changed-integration-files.outputs.fastapi_integration_any_changed }}
  django_ninja_changed:
    description: 'integrations/django-ninja/**'
    value: ${{ steps.changed-integration-files.outputs.django_ninja_integration_any_changed }}
  rust_changed:
    description: 'integrations/rust/**'
    value: ${{ steps.changed-integration-files.outputs.rust_integration_any_changed }}
  docker_changed:
    description: 'integrations/docker/**'
    value: ${{ steps.changed-integration-files.outputs.docker_integration_any_changed }}

  # Integration package.json bumps (drive *-publish jobs)
  aspnetcore_package_changed:
    description: 'integrations/dotnet/aspnetcore/package.json'
    value: ${{ steps.changed-package-files.outputs.aspnetcore_package_any_changed }}
  aspire_package_changed:
    description: 'integrations/dotnet/aspire/package.json'
    value: ${{ steps.changed-package-files.outputs.aspire_package_any_changed }}
  fastapi_package_changed:
    description: 'integrations/fastapi/package.json'
    value: ${{ steps.changed-package-files.outputs.fastapi_package_any_changed }}
  django_ninja_package_changed:
    description: 'integrations/django-ninja/package.json'
    value: ${{ steps.changed-package-files.outputs.django_ninja_package_any_changed }}
  rust_package_changed:
    description: 'integrations/rust/package.json'
    value: ${{ steps.changed-package-files.outputs.rust_package_any_changed }}
  java_package_changed:
    description: 'integrations/java/package.json'
    value: ${{ steps.changed-package-files.outputs.java_package_any_changed }}
  docker_package_changed:
    description: 'integrations/docker/package.json'
    value: ${{ steps.changed-package-files.outputs.docker_package_any_changed }}
  mock_server_docker_package_changed:
    description: 'packages/mock-server/docker/package.json'
    value: ${{ steps.changed-package-files.outputs.mock_server_docker_package_any_changed }}

  # JS package scopes (drive JS test / preview-deploy gates)
  icons_changed:
    description: 'packages/icons/** or ScalarIcon component'
    value: ${{ steps.changed-packages-files.outputs.icons_changed_any_changed }}
  galaxy_changed:
    description: 'packages/galaxy/**'
    value: ${{ steps.changed-packages-files.outputs.galaxy_changed_any_changed }}
  api_client_changed:
    description: 'packages/api-client/** or projects/scalar-app/**'
    value: ${{ steps.changed-packages-files.outputs.api_client_changed_any_changed }}
  api_reference_changed:
    description: 'packages/api-reference/**'
    value: ${{ steps.changed-packages-files.outputs.api_reference_changed_any_changed }}
  components_changed:
    description: 'packages/components/**'
    value: ${{ steps.changed-packages-files.outputs.components_changed_any_changed }}
  scalar_app_package_changed:
    description: 'projects/scalar-app/package.json (drives todesktop)'
    value: ${{ steps.changed-packages-files.outputs.scalar_app_package_any_changed }}

  # Broad JS-side gates
  js_changed:
    description: 'Any JS/TS file or workspace config touched'
    value: ${{ steps.changed-js.outputs.js_any_changed }}
  lockfile_changed:
    description: 'pnpm-lock.yaml or workspace package.json files touched'
    value: ${{ steps.changed-js.outputs.lockfile_any_changed }}

runs:
  using: 'composite'
  steps:
    - name: Check whether integration files were modified
      id: changed-integration-files
      uses: step-security/changed-files@60967b822d3001fa82242f8d6b4ed46bc3600a68 # v47
      with:
        files_yaml: |
          dotnet_integration:
            - integrations/dotnet/**
          java_integration:
            - integrations/java/**
          fastapi_integration:
            - integrations/fastapi/**
          rust_integration:
            - integrations/rust/**
          docker_integration:
            - integrations/docker/**
          django_ninja_integration:
            - integrations/django-ninja/**

    - name: Check whether packages files were modified
      id: changed-packages-files
      uses: step-security/changed-files@60967b822d3001fa82242f8d6b4ed46bc3600a68 # v47
      with:
        files_yaml: |
          icons_changed:
            - packages/icons/**
            - packages/components/src/components/ScalarIcon/**
          galaxy_changed:
            - packages/galaxy/**
          api_client_changed:
            - packages/api-client/**
            - projects/scalar-app/**
          api_reference_changed:
            - packages/api-reference/**
          components_changed:
            - packages/components/**
          scalar_app_package:
            - projects/scalar-app/package.json

    - name: Check whether integration package.json files were modified
      id: changed-package-files
      uses: step-security/changed-files@60967b822d3001fa82242f8d6b4ed46bc3600a68 # v47
      with:
        files_yaml: |
          aspnetcore_package:
            - integrations/dotnet/aspnetcore/package.json
          aspire_package:
            - integrations/dotnet/aspire/package.json
          fastapi_package:
            - integrations/fastapi/package.json
          django_ninja_package:
            - integrations/django-ninja/package.json
          rust_package:
            - integrations/rust/package.json
          java_package:
            - integrations/java/package.json
          docker_package:
            - integrations/docker/package.json
          mock_server_docker_package:
            - packages/mock-server/docker/package.json

    # Broad JS gates. `js` captures any TS/JS source or build config; tightening
    # this is a future cost-saving lever. `lockfile` is its own scope because
    # any lockfile change must rebuild the artifact even if no source moved.
    - name: Check broad JS scopes
      id: changed-js
      uses: step-security/changed-files@60967b822d3001fa82242f8d6b4ed46bc3600a68 # v47
      with:
        files_yaml: |
          js:
            - '**/*.{ts,tsx,js,jsx,cjs,mjs,vue,css}'
            - '**/package.json'
            - '**/tsconfig*.json'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'
            - 'turbo.json'
          lockfile:
            - 'pnpm-lock.yaml'
            - '**/package.json'
            - 'pnpm-workspace.yaml'
