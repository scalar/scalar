name: 'Restore Build'
description: |
  Restore a pre-built workspace produced by the `build` job.

  Downstream test, lint, and deploy jobs use this composite instead of
  re-running the full `pnpm turbo build` pipeline. The composite:
    1. Sets up pnpm + node (shared caches via setup-node composite)
    2. Runs `pnpm install --frozen-lockfile --prefer-offline` (typically a
       warm pnpm-store hit)
    3. Downloads the `workspace-dist` artifact uploaded by the build job and
       extracts it so every `packages|integrations|projects */dist` directory
       is in place.

  IMPORTANT: Artifacts are scoped to a single workflow run. This composite
  intentionally never accepts a `run-id` input — production-publish workflows
  must build their own artifact within the same run, never reuse a PR's.
inputs:
  node-version:
    description: 'Node.js version to use (optional, defaults to reading from .nvmrc)'
    required: false
  artifact-name:
    description: 'Name of the workspace-dist artifact to download'
    required: false
    default: 'workspace-dist'
runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ inputs.node-version }}
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
    - name: Download workspace dist artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: ${{ inputs.artifact-name }}
        path: .
    - name: Extract workspace dist
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -f workspace-dist.tar.zst ]; then
          echo "Expected workspace-dist.tar.zst but it was not in the artifact" >&2
          exit 1
        fi
        tar --zstd -xf workspace-dist.tar.zst
        rm workspace-dist.tar.zst
        echo "Restored workspace dist directories:"
        find packages integrations projects \
          -name node_modules -prune -o \
          -type d -name dist -print 2>/dev/null | sort
