name: Publish Integrations

# Reusable workflow that publishes every non-JS integration to its respective
# registry (DockerHub, NuGet, PyPI, crates.io, Maven Central). Only ever
# called from release.yml after `npm-publish` has succeeded. Each job:
#
#   1. Is gated by the per-package `*_changed` input from check-changes.
#   2. Uses a per-target GitHub Environment (`production-<registry>`) so its
#      tokens are isolated; a bug in one publish job cannot read another's
#      credentials.
#   3. Uses a main-only cache key — separate from the PR build-test caches —
#      so a PR cannot poison a release build.
#
# A `published` input (the changesets/action published flag) provides the
# overall release gate; individual `*_package_changed` inputs let us skip
# publishes whose package.json did not bump.

on:
  workflow_call:
    inputs:
      published:
        description: 'changesets/action outputs.published — gate for every publish'
        type: string
        required: true
      aspnetcore_package_changed:
        type: string
        required: true
      aspire_package_changed:
        type: string
        required: true
      fastapi_package_changed:
        type: string
        required: true
      django_ninja_package_changed:
        type: string
        required: true
      rust_package_changed:
        type: string
        required: true
      java_package_changed:
        type: string
        required: true
      docker_package_changed:
        type: string
        required: true
      mock_server_docker_package_changed:
        type: string
        required: true

permissions:
  contents: read

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  docker-publish:
    if: inputs.published == 'true' && inputs.docker_package_changed == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 10
    environment: production-dockerhub
    concurrency:
      group: docker-publish
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Get version from package.json
        id: package-version
        working-directory: integrations/docker
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download scalar.js artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: scalar-js
          path: integrations/docker/assets

      - name: Compress static assets
        working-directory: integrations/docker/assets
        run: gzip --keep --verbose --force scalar.js

      - name: Setup Docker Builder
        uses: useblacksmith/setup-docker-builder@722e97d12b1d06a961800dd6c05d79d951ad3c80 # v1
        with:
          platforms: |
            linux/amd64
            linux/arm64

      - name: Log in to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8 # v2
        with:
          context: integrations/docker
          file: integrations/docker/Dockerfile
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            scalarapi/api-reference:latest
            scalarapi/api-reference:${{ steps.package-version.outputs.VERSION }}

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: scalarapi/api-reference
          readme-filepath: ./integrations/docker/README.md

  mock-server-docker-publish:
    if: inputs.published == 'true' && inputs.mock_server_docker_package_changed == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 10
    environment: production-dockerhub
    concurrency:
      group: mock-server-docker-publish
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Get version from package.json
        id: package-version
        working-directory: packages/mock-server/docker
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download mock server docker entrypoint artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mock-server-docker-entrypoint
          path: packages/mock-server/docker/dist/

      - name: Setup Docker Builder
        uses: useblacksmith/setup-docker-builder@722e97d12b1d06a961800dd6c05d79d951ad3c80 # v1
        with:
          platforms: |
            linux/amd64
            linux/arm64

      - name: Log in to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8 # v2
        with:
          context: packages/mock-server/docker
          file: packages/mock-server/docker/Dockerfile
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            scalarapi/mock-server:latest
            scalarapi/mock-server:${{ steps.package-version.outputs.VERSION }}

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: scalarapi/mock-server
          readme-filepath: ./packages/mock-server/docker/README.md

  aspnetcore-publish:
    if: inputs.published == 'true' && inputs.aspnetcore_package_changed == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 10
    environment: production-nuget
    concurrency:
      group: aspnetcore-publish
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Get version from package.json
        id: package-version
        working-directory: integrations/dotnet/aspnetcore
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download scalar.js artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: scalar-js
          path: integrations/dotnet/aspnetcore/src/Scalar.AspNetCore/StaticAssets

      - name: Compress static assets
        working-directory: integrations/dotnet/aspnetcore/src/Scalar.AspNetCore/StaticAssets
        run: gzip --keep --verbose --force scalar.js scalar.aspnetcore.js favicon.svg

      # Publish jobs use `cache-publish` as the suffix to keep the cache
      # namespace separate from build-test jobs. Combined with the branch
      # scope (always `main` here, since this workflow is only called from
      # release.yml), this prevents PR-poisoned NuGet downloads from leaking
      # into the artifacts we push to nuget.org.
      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          key: ${{ github.repository }}-${{ github.ref_name }}-nuget-publish-${{ hashFiles('integrations/dotnet/**/*.csproj', 'integrations/dotnet/**/Directory.Packages.props') }}
          path: ${{ env.NUGET_PACKAGES }}

      - name: Setup .NET
        uses: fast-actions/setup-dotnet@a71ae3c1c05fa3c6fae4065438844513d41d893e # v1
        with:
          sdk-version: 10.x.x

      - name: Restore dependencies
        working-directory: integrations/dotnet/aspnetcore
        run: dotnet restore

      - name: Pack packages
        working-directory: integrations/dotnet/aspnetcore
        run: |
          dotnet pack src/Scalar.AspNetCore -c Release --no-restore --output nupkgs /p:Version=${{ steps.package-version.outputs.VERSION }}
          dotnet pack src/Scalar.AspNetCore.Microsoft -c Release --no-restore --output nupkgs /p:Version=${{ steps.package-version.outputs.VERSION }}
          dotnet pack src/Scalar.AspNetCore.Swashbuckle -c Release --no-restore --output nupkgs /p:Version=${{ steps.package-version.outputs.VERSION }}

      - name: Publish packages
        working-directory: integrations/dotnet/aspnetcore
        run: dotnet nuget push nupkgs/*.nupkg -k ${{ secrets.NUGET_TOKEN }} -s https://api.nuget.org/v3/index.json

  aspire-publish:
    if: inputs.published == 'true' && inputs.aspire_package_changed == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 15
    # Aspire publishes to both DockerHub (image) and NuGet (package). Use the
    # combined environment so both sets of secrets are available; an explicit
    # production-aspire environment also gives us a single reviewer gate.
    environment: production-aspire
    concurrency:
      group: aspire-publish
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Get version from package.json
        id: package-version
        working-directory: integrations/dotnet/aspire
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download scalar.js artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: scalar-js
          path: integrations/dotnet/aspire/src/Scalar.Aspire.Service/wwwroot

      - name: Log in to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - name: Setup Docker Builder
        uses: useblacksmith/setup-docker-builder@722e97d12b1d06a961800dd6c05d79d951ad3c80 # v1
        with:
          platforms: |
            linux/amd64
            linux/arm64

      - name: Build and push Aspire Docker image
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8 # v2
        with:
          context: integrations/dotnet
          file: integrations/dotnet/aspire/src/Scalar.Aspire.Service/Dockerfile
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            scalarapi/aspire-api-reference:latest
            scalarapi/aspire-api-reference:${{ steps.package-version.outputs.VERSION }}

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: scalarapi/aspire-api-reference
          readme-filepath: ./integrations/dotnet/aspire/README.md

      - name: Set version in Constants.cs
        working-directory: integrations/dotnet/aspire
        env:
          VERSION: ${{ steps.package-version.outputs.VERSION }}
        run: |
          sed -i "s/ImageTag = \"latest\"/ImageTag = \"${VERSION}\"/" src/Scalar.Aspire/Constants.cs
          cat src/Scalar.Aspire/Constants.cs

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          key: ${{ github.repository }}-${{ github.ref_name }}-nuget-publish-${{ hashFiles('integrations/dotnet/**/*.csproj', 'integrations/dotnet/**/Directory.Packages.props') }}
          path: ${{ env.NUGET_PACKAGES }}

      - name: Setup .NET
        uses: fast-actions/setup-dotnet@a71ae3c1c05fa3c6fae4065438844513d41d893e # v1
        with:
          sdk-version: 10.x.x

      - name: Restore dependencies
        working-directory: integrations/dotnet/aspire/src/Scalar.Aspire
        run: dotnet restore

      - name: Pack Scalar.Aspire NuGet package
        working-directory: integrations/dotnet/aspire/src/Scalar.Aspire
        run: dotnet pack -c Release --no-restore --output nupkgs /p:Version=${{ steps.package-version.outputs.VERSION }}

      - name: Publish Scalar.Aspire NuGet package
        working-directory: integrations/dotnet/aspire/src/Scalar.Aspire
        run: dotnet nuget push nupkgs/*.nupkg -k ${{ secrets.NUGET_TOKEN }} -s https://api.nuget.org/v3/index.json

  fastapi-publish:
    if: inputs.published == 'true' && inputs.fastapi_package_changed == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 10
    environment: production-pypi
    concurrency:
      group: fastapi-publish
      cancel-in-progress: false
    permissions:
      # PyPI Trusted Publisher (OIDC) needs id-token: write. Setting it here
      # is harmless when still using a token; flip the publish step to OIDC
      # once the Trusted Publisher is configured on PyPI and drop PYPI_TOKEN.
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install build dependencies
        working-directory: integrations/fastapi
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build FastAPI package
        working-directory: integrations/fastapi
        run: python -m build

      - name: Publish FastAPI package to PyPI
        working-directory: integrations/fastapi
        run: |
          twine upload --username __token__ --password ${{ secrets.PYPI_TOKEN }} dist/*

  django-ninja-publish:
    if: inputs.published == 'true' && inputs.django_ninja_package_changed == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 10
    environment: production-pypi
    concurrency:
      group: django-ninja-publish
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install build dependencies
        working-directory: integrations/django-ninja
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Django Ninja package
        working-directory: integrations/django-ninja
        run: python -m build

      - name: Publish Django Ninja package to PyPI
        working-directory: integrations/django-ninja
        run: |
          twine upload --username __token__ --password ${{ secrets.PYPI_TOKEN }} dist/*

  rust-publish:
    if: inputs.published == 'true' && inputs.rust_package_changed == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 15
    environment: production-crates
    concurrency:
      group: rust-publish
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download scalar.js artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: scalar-js
          path: integrations/rust/ui

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      # Publish-only cargo cache (separate suffix from build-test). No
      # `target/` here — we want `cargo publish` to recompile from scratch so
      # nothing left over from a PR build sneaks into the published crate.
      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ github.ref_name }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Get version from package.json
        id: package-version
        working-directory: integrations/rust
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Bump version then commit-as-clean so `cargo publish` does not need
      # --allow-dirty and we can be sure no untracked files end up in the crate.
      - name: Update Cargo.toml version and commit locally
        working-directory: integrations/rust
        env:
          VERSION: ${{ steps.package-version.outputs.VERSION }}
        run: |
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$VERSION\"/}" Cargo.toml
          grep ^version Cargo.toml
          git -c user.email=ci@scalar.com -c user.name=ci config --local commit.gpgsign false
          git -c user.email=ci@scalar.com -c user.name=ci add -A integrations/rust/Cargo.toml integrations/rust/ui
          git -c user.email=ci@scalar.com -c user.name=ci commit -m "ci: release artifacts" --allow-empty

      - name: Publish to crates.io
        working-directory: integrations/rust
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  java-publish:
    if: inputs.published == 'true' && inputs.java_package_changed == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 15
    environment: production-maven
    concurrency:
      group: java-publish
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Download scalar.js artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: scalar-js
          path: integrations/java/scalar-core/src/main/resources/META-INF/resources/webjars/scalar
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: '**/java/pom.xml'
          server-id: 'central'
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Get version from package.json
        id: package-version
        working-directory: integrations/java
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Set version in parent POM
        working-directory: integrations/java
        run: mvn versions:set -DnewVersion=${{ steps.package-version.outputs.VERSION }} -DgenerateBackupPoms=false
      - name: Build all Java modules
        working-directory: integrations/java
        run: mvn clean package -pl scalar-core,scalar-webmvc,scalar-webflux -am
      - name: Publish all Java modules to Maven Central
        working-directory: integrations/java
        run: mvn deploy -pl scalar-core,scalar-webmvc,scalar-webflux -am
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_KEYNAME: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
