name: Cache Refresh

# Weekly cold rebuild of the main-branch turbo and pnpm-store caches.
#
# Goal: bound how long a stale or poisoned cache entry can survive on the
# main-branch stickydisks. Once a week we wipe the disks clean, run a full
# install + build from scratch, and let the stickydisk mechanism snapshot
# the resulting fresh state.
#
# IMPORTANT: this workflow MUST write to the same cache keys that pr.yml
# and main.yml read. The setup-node composite computes that key from
# `github.repository`, `github.ref_name`, the .nvmrc Node version, and the
# `cache-version` input. We deliberately do NOT pass `cache-version` here
# so we inherit the default ('v1') that the CI workflows use; otherwise the
# refresh would populate an orphan stickydisk and never benefit CI.

on:
  schedule:
    # Sundays 03:00 UTC. Quiet time, no overlap with usual release flow.
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cache-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: main

      # Mount the same stickydisks that CI uses. The composite is a no-op on
      # non-blacksmith runners, but this job always runs on blacksmith so the
      # disks are guaranteed to be mounted.
      - uses: ./.github/actions/setup-node

      # Wipe the mounted cache contents BEFORE re-populating. Without this
      # step the stickydisk would only accumulate fresh entries alongside
      # any stale or poisoned ones; with it, the disk state at job end
      # contains exactly what was rebuilt from scratch in this run.
      - name: Clear existing cache contents
        run: |
          set -euo pipefail
          echo "Cache state before clear:"
          du -sh ./.turbo 2>/dev/null || echo "  ./.turbo: missing"
          du -sh ~/.local/share/pnpm/store 2>/dev/null || echo "  pnpm store: missing"

          rm -rf ./.turbo
          # Keep the directory itself so the stickydisk mount remains valid;
          # only remove its contents.
          if [ -d ~/.local/share/pnpm/store ]; then
            find ~/.local/share/pnpm/store -mindepth 1 -delete
          fi

      - name: Install dependencies (cold)
        run: pnpm install --frozen-lockfile

      - name: Build all packages (cold)
        run: |
          # shellcheck disable=SC2086 # TURBO_FLAGS must word-split into multiple args
          pnpm turbo $TURBO_FLAGS --filter './{packages,integrations}/**' build
        env:
          TURBO_FLAGS: '--concurrency=100% --filter "!./integrations/{java,rust,dotnet,docker,fastapi,django-ninja}/**" --filter "!./projects/proxy-scalar-com/**"'

      - name: Report cache footprints
        run: |
          {
            echo "## Cache refresh summary"
            echo ''
            echo '| Path | Size |'
            echo '|---|---|'
            for p in ./.turbo ~/.local/share/pnpm/store; do
              if [ -d "$p" ]; then
                echo "| $p | $(du -sh "$p" | cut -f1) |"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"
