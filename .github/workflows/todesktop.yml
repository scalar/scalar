name: ToDesktop Build

# Reusable workflow that ships a desktop build to ToDesktop's cloud. Only ever
# called from release.yml, after npm-publish ran and scalar-app's version was
# bumped on this commit. scalar-app is private, so we gate on the version-bump
# signal (`scalar_app_released`) rather than the npm `published` flag.

on:
  workflow_call:
    inputs:
      scalar_app_released:
        type: string
        required: true

permissions:
  contents: read

jobs:
  todesktop-build:
    if: inputs.scalar_app_released == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2204
    timeout-minutes: 15
    environment: production-todesktop
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Build workspace deps
        uses: ./.github/actions/build
        with:
          packages: 'scalar-app...'
        env:
          VITE_DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_SERVICES_URL: ${{ vars.SERVICES_URL }}
      - name: Check ToDesktop credentials
        env:
          TODESKTOP_EMAIL: ${{ vars.TODESKTOP_EMAIL || secrets.TODESKTOP_EMAIL }}
          TODESKTOP_ACCESS_TOKEN: ${{ secrets.TODESKTOP_ACCESS_TOKEN }}
        run: |
          if [ -z "${TODESKTOP_EMAIL}" ] || [ -z "${TODESKTOP_ACCESS_TOKEN}" ]; then
            echo "Missing required ToDesktop credentials (TODESKTOP_EMAIL and TODESKTOP_ACCESS_TOKEN)." >&2
            exit 1
          fi
      - name: Send build to ToDesktop cloud
        run: pnpm --filter scalar-app todesktop:build:ci
        env:
          TODESKTOP_EMAIL: ${{ vars.TODESKTOP_EMAIL || secrets.TODESKTOP_EMAIL }}
          TODESKTOP_ACCESS_TOKEN: ${{ secrets.TODESKTOP_ACCESS_TOKEN }}
