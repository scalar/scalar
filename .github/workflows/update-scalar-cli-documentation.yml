name: Update Scalar CLI Documentation

on:
  # Run every day at 15:00 UTC
  schedule:
    - cron: '0 15 * * *'
  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-cli-docs:
    name: Update CLI Documentation
    permissions:
      contents: write
      pull-requests: write
    if: ${{ github.repository_owner == 'scalar' }}
    runs-on: blacksmith-2vcpu-ubuntu-2204
    # Holds the release bot app credentials (without NPM_TOKEN) so the docs PR
    # can be opened by the app rather than by GITHUB_TOKEN.
    environment: release-bot
    timeout-minutes: 15
    strategy:
      matrix:
        commands-markdown: [documentation/guides/cli/commands.md]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Generate CLI documentation
        run: npx @scalar/cli@latest readme generate --output ${{ matrix.commands-markdown }}

      - name: Extract just the commands
        run: |
          sed -n '/^## Commands$/,/^## /p' ${{ matrix.commands-markdown }} | sed '$d' > ${{ matrix.commands-markdown }}-extracted.md

      - name: Update the heading levels
        run: |
          awk '
            BEGIN { code=0 }
            /^[[:space:]]*(```|~~~)/ { code = !code; print; next }
            !code && /^#{1,6} / {
              sub(/^#/, "", $0)  # remove one leading #
            }
            { print }
          ' ${{ matrix.commands-markdown }}-extracted.md > ${{ matrix.commands-markdown }}

      - name: Remove the temporary files
        run: rm -Rf ${{ matrix.commands-markdown }}-*.md

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet ${{ matrix.commands-markdown }}; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi

      # Mint a short-lived GitHub App token so the docs PR is opened by our app
      # instead of GITHUB_TOKEN. Pull requests created with GITHUB_TOKEN do not
      # trigger workflow events, so their CI checks stay pending forever; an app
      # token lifts that restriction. The token is generated here, right before
      # it is used, so the untrusted `npx @scalar/cli@latest` step above never
      # runs while a live app token exists in the job.
      - name: Generate GitHub App token
        id: app-token
        if: steps.check-changes.outputs.has-changes == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          # Scope the token to the minimum needed to open the docs PR.
          permission-contents: write
          permission-pull-requests: write

      - name: Create Pull Request
        if: steps.check-changes.outputs.has-changes == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          # The app token (not GITHUB_TOKEN) is what makes the PR trigger CI.
          token: ${{ steps.app-token.outputs.token }}
          # Restrict the PR to the generated markdown file only. Even if an
          # upstream step were compromised and touched other files, nothing but
          # this path can be staged into the PR.
          add-paths: ${{ matrix.commands-markdown }}
          base: main
          commit-message: 'docs(cli): update commands'
          title: 'docs(cli): update commands'
          body: |
            > This PR was automatically created by a scheduled workflow.

            This PR updates the CLI commands documentation by running the latest version of @scalar/cli.

            ```bash
            npx @scalar/cli@latest readme generate --output ${{ matrix.commands-markdown }}
            ```
          branch: docs/update-cli-documentation
          delete-branch: true
