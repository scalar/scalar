<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!--
      Content Security Policy — https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP

      Unlike the web build, the desktop renderer never makes arbitrary cross-origin
      requests: API client requests, document imports, and OAuth/OIDC token and
      discovery requests are all piped through the Electron main process over IPC
      (see entrypoints/electron/helpers/custom-fetch). That lets us drop the
      previous `connect-src *` down to Scalar's own infrastructure plus the
      analytics endpoints. `http(s)://localhost` and `ws://localhost` stay allowed
      so the dev server, HMR, and local backends keep working. Do not widen
      `connect-src` to reach a user-supplied host — route it through IPC instead.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; connect-src 'self' https://*.scalar.com https://cdn.usefathom.com http://localhost:* ws://localhost:*; script-src 'self' https://cdn.usefathom.com https://magic.scalar.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; media-src 'self' data: blob: https://*.scalar.com https://scalar.com; object-src 'self' blob:; frame-src 'self' blob:; font-src https://fonts.scalar.com 'self'" />
  </head>

  <body class="scalar-app">
    <!-- HTML Element for the API client -->
    <div
      id="scalar-client"
      class="scalar-client overflow-hidden"></div>

    <!-- JavaScript -->
    <script
      type="module"
      src="./src/main.ts"></script>
  </body>
</html>
