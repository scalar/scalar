<!doctype html>
<html>
  <head>
    <title>Scalar Code Highlighting Demo</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
    <style>
      @import '@scalar/themes/style.css';

      :root {
        --scalar-font: 'Inter';
      }

      body {
        background-color: var(--scalar-background-1);
        color: var(--scalar-color-1);
        font-family: var(--scalar-font);
        max-width: 880px;
        margin: 0 auto;
        padding: 24px 24px 80px;
      }

      /* Section labels above each code block */
      .section-header {
        display: block;
        margin: 36px 0 10px;
        padding: 0;
        border: none;
        font-size: 12px;
        font-weight: var(--scalar-semibold, 600);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--scalar-color-3);
      }

      /* Simple card wrapper around each highlighted block */
      .code-card {
        background-color: var(--scalar-background-2);
        border: 1px solid var(--scalar-border-color);
        border-radius: var(--scalar-radius-lg, 12px);
        padding: 14px 18px;
        overflow: hidden;
      }

      code {
        display: block;
        width: 100%;
        background-color: transparent;
        overflow-x: auto;
        scrollbar-width: thin;
      }

      #dark-mode-btn {
        border: none;
        box-shadow: 0 0 0 1px var(--scalar-background-3);
        background-color: transparent;
        color: var(--scalar-color-1);
        padding: 8px 14px;
        margin-bottom: 8px;
        border-radius: var(--scalar-radius);
        cursor: pointer;
        transition: box-shadow 0.2s linear;
      }

      #dark-mode-btn:hover {
        box-shadow: 0 0 0 1px var(--scalar-color-1);
      }

      #dark-mode-btn:active {
        box-shadow: none;
        transition: box-shadow 0s;
      }
    </style>
    <script type="module"></script>
  </head>
  <body class="scalar-app dark-mode">
    <button
      id="dark-mode-btn"
      type="button">
      Dark Mode/Light Mode
    </button>
    <div id="code"></div>
    <script
      src="playground/main.ts"
      type="module"></script>
  </body>
</html>
