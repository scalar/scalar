<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/vite.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Scalar API Client Web</title>
    <style>
      html,
      body {
        height: 100dvh;
        overflow: hidden;
      }
      body {
        display: grid;
        grid-template-rows: auto 1fr;
      }
      body > header {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #scalar-client,
      #scalar-client > main {
        display: flex;
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>
  <body class="scalar-app">
    <div
      id="scalar-client"
      class="scalar-client"></div>
    <script
      type="module"
      src="./main.ts"></script>
  </body>
</html>
