openapi: 3.1.0
info:
  title: Header Parameters Test API
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /users:
    get:
      summary: Get users with custom headers
      description: This endpoint requires custom header parameters
      parameters:
        - name: X-Custom-Header
          in: header
          required: true
          description: A custom required header
          schema:
            type: string
            example: custom-value-123
        - name: X-Optional-Header
          in: header
          required: false
          description: An optional header parameter
          schema:
            type: string
            example: optional-value
        - name: X-API-Version
          in: header
          required: true
          description: API version header
          schema:
            type: string
            enum:
              - v1
              - v2
            example: v1
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
