<!doctype html>
<html>
  <head>
    <title>Scalar API Reference</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
  </head>

  <body>
    <div id="app"></div>

    <!-- Our Script -->
    <script
      src="src/standalone.ts"
      type="module"></script>

    <!-- Initialize the Scalar API Reference -->
    <script type="module">
      Scalar.createApiReference('#app', {
        pathRouting: {
          basePath: '/my-custom-base-path',
        },
        content: {
          openapi: '3.1.1',
          info: {
            title: 'Test API',
            version: '1.0.0',
          },
          paths: {
            '/users': {
              get: {
                summary: 'Get all users',
                tags: ['Users'],
                responses: {
                  200: {
                    description: 'List of users',
                    content: {
                      'application/json': {
                        schema: {
                          type: 'array',
                          items: {
                            $ref: '#/components/schemas/User',
                          },
                        },
                      },
                    },
                  },
                },
              },
              post: {
                summary: 'Create a new user',
                tags: ['Users'],
                requestBody: {
                  content: {
                    'application/json': {
                      schema: {
                        $ref: '#/components/schemas/UserInput',
                      },
                    },
                  },
                },
                responses: {
                  201: {
                    description: 'User created successfully',
                    content: {
                      'application/json': {
                        schema: {
                          $ref: '#/components/schemas/User',
                        },
                      },
                    },
                  },
                },
              },
            },
            '/users/{id}': {
              get: {
                summary: 'Get user by ID',
                tags: ['Users'],
                parameters: [
                  {
                    name: 'id',
                    in: 'path',
                    required: true,
                    schema: {
                      type: 'string',
                    },
                  },
                ],
                responses: {
                  200: {
                    description: 'User details',
                    content: {
                      'application/json': {
                        schema: {
                          $ref: '#/components/schemas/User',
                        },
                      },
                    },
                  },
                },
              },
            },
            '/products': {
              get: {
                summary: 'Get all products',
                tags: ['Products'],
                responses: {
                  200: {
                    description: 'List of products',
                    content: {
                      'application/json': {
                        schema: {
                          type: 'array',
                          items: {
                            $ref: '#/components/schemas/Product',
                          },
                        },
                      },
                    },
                  },
                },
              },
            },
            '/orders': {
              get: {
                summary: 'Get all orders',
                tags: ['Orders'],
                responses: {
                  200: {
                    description: 'List of orders',
                    content: {
                      'application/json': {
                        schema: {
                          type: 'array',
                          items: {
                            $ref: '#/components/schemas/Order',
                          },
                        },
                      },
                    },
                  },
                },
              },
              post: {
                summary: 'Create a new order',
                tags: ['Orders'],
                requestBody: {
                  content: {
                    'application/json': {
                      schema: {
                        $ref: '#/components/schemas/OrderInput',
                      },
                    },
                  },
                },
                responses: {
                  201: {
                    description: 'Order created successfully',
                    content: {
                      'application/json': {
                        schema: {
                          $ref: '#/components/schemas/Order',
                        },
                      },
                    },
                  },
                },
              },
            },
            '/auth/login': {
              post: {
                summary: 'User login',
                tags: ['Authentication'],
                requestBody: {
                  content: {
                    'application/json': {
                      schema: {
                        type: 'object',
                        properties: {
                          email: {
                            type: 'string',
                            format: 'email',
                          },
                          password: {
                            type: 'string',
                          },
                        },
                        required: ['email', 'password'],
                      },
                    },
                  },
                },
                responses: {
                  200: {
                    description: 'Login successful',
                    content: {
                      'application/json': {
                        schema: {
                          type: 'object',
                          properties: {
                            token: {
                              type: 'string',
                            },
                            user: {
                              $ref: '#/components/schemas/User',
                            },
                          },
                        },
                      },
                    },
                  },
                },
              },
            },
            '/files/upload': {
              post: {
                summary: 'Upload a file',
                tags: ['Files'],
                requestBody: {
                  content: {
                    'multipart/form-data': {
                      schema: {
                        type: 'object',
                        properties: {
                          file: {
                            type: 'string',
                            format: 'binary',
                          },
                        },
                      },
                    },
                  },
                },
                responses: {
                  200: {
                    description: 'File uploaded successfully',
                    content: {
                      'application/json': {
                        schema: {
                          type: 'object',
                          properties: {
                            url: {
                              type: 'string',
                            },
                            filename: {
                              type: 'string',
                            },
                          },
                        },
                      },
                    },
                  },
                },
              },
            },
            '/notifications': {
              get: {
                summary: 'Get user notifications',
                tags: ['Notifications'],
                responses: {
                  200: {
                    description: 'List of notifications',
                    content: {
                      'application/json': {
                        schema: {
                          type: 'array',
                          items: {
                            $ref: '#/components/schemas/Notification',
                          },
                        },
                      },
                    },
                  },
                },
              },
            },
            '/analytics/dashboard': {
              get: {
                summary: 'Get dashboard analytics',
                tags: ['Analytics'],
                responses: {
                  200: {
                    description: 'Dashboard data',
                    content: {
                      'application/json': {
                        schema: {
                          type: 'object',
                          properties: {
                            totalUsers: {
                              type: 'number',
                            },
                            totalOrders: {
                              type: 'number',
                            },
                            revenue: {
                              type: 'number',
                            },
                          },
                        },
                      },
                    },
                  },
                },
              },
            },
            '/settings': {
              get: {
                summary: 'Get application settings',
                tags: ['Settings'],
                responses: {
                  200: {
                    description: 'Application settings',
                    content: {
                      'application/json': {
                        schema: {
                          $ref: '#/components/schemas/Settings',
                        },
                      },
                    },
                  },
                },
              },
              put: {
                summary: 'Update application settings',
                tags: ['Settings'],
                requestBody: {
                  content: {
                    'application/json': {
                      schema: {
                        $ref: '#/components/schemas/Settings',
                      },
                    },
                  },
                },
                responses: {
                  200: {
                    description: 'Settings updated successfully',
                    content: {
                      'application/json': {
                        schema: {
                          $ref: '#/components/schemas/Settings',
                        },
                      },
                    },
                  },
                },
              },
            },
          },
          components: {
            schemas: {
              User: {
                type: 'object',
                properties: {
                  id: {
                    type: 'string',
                  },
                  name: {
                    type: 'string',
                  },
                  email: {
                    type: 'string',
                    format: 'email',
                  },
                  createdAt: {
                    type: 'string',
                    format: 'date-time',
                  },
                },
              },
              UserInput: {
                type: 'object',
                properties: {
                  name: {
                    type: 'string',
                  },
                  email: {
                    type: 'string',
                    format: 'email',
                  },
                  password: {
                    type: 'string',
                  },
                },
                required: ['name', 'email', 'password'],
              },
              Product: {
                type: 'object',
                properties: {
                  id: {
                    type: 'string',
                  },
                  name: {
                    type: 'string',
                  },
                  price: {
                    type: 'number',
                  },
                  description: {
                    type: 'string',
                  },
                },
              },
              Order: {
                type: 'object',
                properties: {
                  id: {
                    type: 'string',
                  },
                  userId: {
                    type: 'string',
                  },
                  products: {
                    type: 'array',
                    items: {
                      type: 'object',
                      properties: {
                        productId: {
                          type: 'string',
                        },
                        quantity: {
                          type: 'number',
                        },
                      },
                    },
                  },
                  total: {
                    type: 'number',
                  },
                  status: {
                    type: 'string',
                    enum: ['pending', 'processing', 'shipped', 'delivered'],
                  },
                },
              },
              OrderInput: {
                type: 'object',
                properties: {
                  products: {
                    type: 'array',
                    items: {
                      type: 'object',
                      properties: {
                        productId: {
                          type: 'string',
                        },
                        quantity: {
                          type: 'number',
                        },
                      },
                    },
                  },
                },
                required: ['products'],
              },
              Notification: {
                type: 'object',
                properties: {
                  id: {
                    type: 'string',
                  },
                  title: {
                    type: 'string',
                  },
                  message: {
                    type: 'string',
                  },
                  read: {
                    type: 'boolean',
                  },
                  createdAt: {
                    type: 'string',
                    format: 'date-time',
                  },
                },
              },
              Settings: {
                type: 'object',
                properties: {
                  theme: {
                    type: 'string',
                    enum: ['light', 'dark'],
                  },
                  language: {
                    type: 'string',
                  },
                  notifications: {
                    type: 'boolean',
                  },
                },
              },
            },
          },
        },
      })
    </script>
  </body>
</html>
